name: Deploy to Coolify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Coolify Webhook
        run: |
          curl --request GET \
            --url "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --fail \
            --silent \
            --show-error
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}

      - name: Notificar sucesso
        if: success()
        run: echo "Deploy iniciado com sucesso no Coolify!"

      - name: Notificar falha
        if: failure()
        run: echo "Falha ao acionar deploy no Coolify!"
